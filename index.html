<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Connector Routing Test</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        display: flex;
        height: 100vh;
      }
      #sidebar {
        width: 260px;
        border-right: 1px solid #ddd;
        padding: 12px;
        box-sizing: border-box;
        font-size: 14px;
      }
      #app {
        flex: 1;
        display: flex;
        align-items: stretch;
        justify-content: center;
        background: #f5f5f5;
      }
      svg {
        background: white;
        border: 1px solid #ccc;
        margin: auto;
      }
      label {
        display: block;
        margin: 8px 0 4px;
        font-weight: 600;
      }
      select {
        width: 100%;
        padding: 4px;
      }
      code {
        font-size: 12px;
        background: #eee;
        padding: 2px 4px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h3>Routing Test</h3>
      <label for="case-select">Test case</label>
      <select id="case-select"></select>
      <p style="margin-top:12px;">
        Rect format: <code>(x, y, width, height)</code><br />
        Red = connector, Black = items.
      </p>
      <p>You can change cases in <code>main.ts</code>.</p>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
